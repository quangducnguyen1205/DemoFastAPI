services:
  backend:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${PROJECT3_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      OBJECT_STORAGE_ENDPOINT_URL: ${PROJECT3_OBJECT_STORAGE_ENDPOINT_URL:-http://minio:9000}
      ASSISTANT_LLM_ENABLED: ${ASSISTANT_LLM_ENABLED:-true}
      ASSISTANT_OLLAMA_BASE_URL: ${ASSISTANT_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      ASSISTANT_OLLAMA_MODEL: ${ASSISTANT_OLLAMA_MODEL:-qwen3:4b}
      ASSISTANT_OLLAMA_TIMEOUT_SECONDS: ${ASSISTANT_OLLAMA_TIMEOUT_SECONDS:-60}
      ASSISTANT_OLLAMA_NUM_PREDICT: ${ASSISTANT_OLLAMA_NUM_PREDICT:-256}
    networks:
      - default
      - spring-infra

  consumer:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${PROJECT3_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      OBJECT_STORAGE_ENDPOINT_URL: ${PROJECT3_OBJECT_STORAGE_ENDPOINT_URL:-http://minio:9000}
    networks:
      - default
      - spring-infra

  worker:
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${PROJECT3_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      OBJECT_STORAGE_ENDPOINT_URL: ${PROJECT3_OBJECT_STORAGE_ENDPOINT_URL:-http://minio:9000}
    networks:
      - default
      - spring-infra

  result-relay:
    # Keep the automatic relay environment narrow; base Compose still owns the one-shot env file.
    profiles: !reset []
    env_file: !reset []
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${PROJECT3_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      PROCESSING_OUTBOX_AUTO_RELAY_ENABLED: "true"
      PROCESSING_RESULT_PUBLISHER_ENABLED: "true"
      PROCESSING_OUTBOX_AUTO_RELAY_INTERVAL_SECONDS: ${PROCESSING_OUTBOX_AUTO_RELAY_INTERVAL_SECONDS:-10}
      PROCESSING_OUTBOX_AUTO_RELAY_BATCH_SIZE: ${PROCESSING_OUTBOX_AUTO_RELAY_BATCH_SIZE:-10}
    networks:
      - default
      - spring-infra
    command: python -m app.relays.processing_outbox_auto_relay

networks:
  spring-infra:
    name: ${SPRING_INFRA_NETWORK:-infra_default}
    external: true
