services:
  backend:
    image: demofirstbackend-python:latest
    build:
      context: ./backend
      target: runtime
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      PYTHONPATH: /backend
      DATABASE_URL: ${DATABASE_URL}
      MEDIA_ROOT: /backend/media
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - ./backend:/backend
      - ./backend/media:/backend/media

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=userdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    image: demofirstbackend-python:latest
    depends_on:
      - db
      - redis
    environment:
      PYTHONPATH: /backend
      DATABASE_URL: ${DATABASE_URL}
      MEDIA_ROOT: /backend/media
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      OBJECT_STORAGE_ENDPOINT_URL: ${OBJECT_STORAGE_ENDPOINT_URL:-http://host.docker.internal:9000}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-minioadmin}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-minioadmin}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - ./backend:/backend
      - ./backend/media:/backend/media
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-1}

  consumer:
    image: demofirstbackend-python:latest
    depends_on:
      - db
      - redis
    environment:
      PYTHONPATH: /backend
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-host.docker.internal:9092}
      KAFKA_ASSET_PROCESSING_TOPIC: ${KAFKA_ASSET_PROCESSING_TOPIC:-asset.processing.requested.v1}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-fastapi-processing-v1}
      KAFKA_AUTO_OFFSET_RESET: ${KAFKA_AUTO_OFFSET_RESET:-earliest}
      KAFKA_RECONNECT_BACKOFF_SECONDS: ${KAFKA_RECONNECT_BACKOFF_SECONDS:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - ./backend:/backend
    command: python -m app.consumers.asset_processing_consumer

  result-relay:
    image: demofirstbackend-python:latest
    profiles:
      - manual
    depends_on:
      - db
    environment:
      PYTHONPATH: /backend
      DATABASE_URL: ${DATABASE_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-host.docker.internal:9092}
      KAFKA_PROCESSING_RESULT_TOPIC: ${KAFKA_PROCESSING_RESULT_TOPIC:-asset.processing.result.v1}
      KAFKA_SEND_TIMEOUT_SECONDS: ${KAFKA_SEND_TIMEOUT_SECONDS:-10}
      PROCESSING_RESULT_PUBLISHER_ENABLED: ${PROCESSING_RESULT_PUBLISHER_ENABLED:-false}
      PROCESSING_OUTBOX_RELAY_ENABLED: ${PROCESSING_OUTBOX_RELAY_ENABLED:-false}
      PROCESSING_OUTBOX_RELAY_BATCH_SIZE: ${PROCESSING_OUTBOX_RELAY_BATCH_SIZE:-10}
      PROCESSING_OUTBOX_RELAY_MAX_ATTEMPTS: ${PROCESSING_OUTBOX_RELAY_MAX_ATTEMPTS:-5}
      PROCESSING_OUTBOX_RELAY_RETRY_DELAY_SECONDS: ${PROCESSING_OUTBOX_RELAY_RETRY_DELAY_SECONDS:-60}
      PROCESSING_OUTBOX_RECOVERY_ENABLED: ${PROCESSING_OUTBOX_RECOVERY_ENABLED:-false}
      PROCESSING_OUTBOX_RECOVERY_INTERVAL_SECONDS: ${PROCESSING_OUTBOX_RECOVERY_INTERVAL_SECONDS:-30}
      PROCESSING_OUTBOX_RECOVERY_COOLDOWN_SECONDS: ${PROCESSING_OUTBOX_RECOVERY_COOLDOWN_SECONDS:-60}
      PROCESSING_OUTBOX_RECOVERY_BATCH_SIZE: ${PROCESSING_OUTBOX_RECOVERY_BATCH_SIZE:-50}
      PROCESSING_OUTBOX_RECOVERY_MAX_CYCLES: ${PROCESSING_OUTBOX_RECOVERY_MAX_CYCLES:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - ./backend:/backend
    command: python -m app.relays.processing_outbox_relay

volumes:
  postgres_data:
